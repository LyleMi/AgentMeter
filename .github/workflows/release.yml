name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Build Windows executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          go build -trimpath -ldflags "-s -w" -o dist/AgentMeter.exe .

      - name: Package release
        shell: pwsh
        run: |
          $packageRoot = Join-Path $PWD "dist/AgentMeter"
          $asset = Join-Path $PWD "dist/AgentMeter-windows-amd64.zip"

          Remove-Item -LiteralPath $packageRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $asset -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageRoot "frontend") -Force | Out-Null

          Copy-Item -LiteralPath "dist/AgentMeter.exe" -Destination $packageRoot
          Copy-Item -LiteralPath "frontend/dist" -Destination (Join-Path $packageRoot "frontend/dist") -Recurse
          Copy-Item -LiteralPath "README.md", "README.zh-CN.md", "LICENSE", "CHANGELOG.md" -Destination $packageRoot

          if (-not (Test-Path (Join-Path $packageRoot "frontend/dist/index.html"))) {
            throw "Release package is missing frontend/dist/index.html"
          }

          $source = Join-Path $packageRoot "*"
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            try {
              Compress-Archive -Path $source -DestinationPath $asset -Force
              break
            } catch {
              if ($attempt -eq 3) {
                throw
              }
              Start-Sleep -Seconds 2
            }
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentMeter-windows-amd64
          path: dist/AgentMeter-windows-amd64.zip
          if-no-files-found: error

      - name: Prepare release notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $escapedTag = [regex]::Escape($tag)
          $lines = Get-Content CHANGELOG.md
          $start = -1

          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^##\s+\[$escapedTag\]" -or $lines[$i] -match "^##\s+$escapedTag\b") {
              $start = $i
              break
            }
          }

          $notesLines = @()
          if ($start -ge 0) {
            for ($i = $start + 1; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match "^##\s+") {
                break
              }
              $notesLines += $lines[$i]
            }
          }

          $notes = ($notesLines -join "`n").Trim()
          if (-not $notes) {
            $notes = "Automated Windows amd64 build."
          }
          Set-Content -Path "dist/release-notes.md" -Value $notes -Encoding utf8

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "dist/AgentMeter-windows-amd64.zip"
          $notes = "dist/release-notes.md"

          if (-not (Test-Path $asset)) {
            throw "Release asset not found: $asset"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
            gh release edit $tag --title "AgentMeter $tag" --notes-file $notes
          } else {
            gh release create $tag $asset --title "AgentMeter $tag" --notes-file $notes
          }
