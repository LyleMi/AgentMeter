name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Run Go tests
        run: go test ./...

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  build:
    name: Build ${{ matrix.asset_name }}
    needs: validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary_ext: .exe
            archive: zip
            asset_name: AgentMeter-windows-amd64.zip
          - goos: windows
            goarch: arm64
            binary_ext: .exe
            archive: zip
            asset_name: AgentMeter-windows-arm64.zip
          - goos: linux
            goarch: amd64
            binary_ext: ""
            archive: tar.gz
            asset_name: AgentMeter-linux-amd64.tar.gz
          - goos: linux
            goarch: arm64
            binary_ext: ""
            archive: tar.gz
            asset_name: AgentMeter-linux-arm64.tar.gz
          - goos: darwin
            goarch: amd64
            binary_ext: ""
            archive: tar.gz
            asset_name: AgentMeter-darwin-amd64.tar.gz
          - goos: darwin
            goarch: arm64
            binary_ext: ""
            archive: tar.gz
            asset_name: AgentMeter-darwin-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build executable
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/AgentMeter${{ matrix.binary_ext }}" .

      - name: Package release
        shell: bash
        run: |
          package_root="dist/package/AgentMeter"
          asset="dist/${{ matrix.asset_name }}"

          rm -rf "$package_root" "$asset"
          mkdir -p "$package_root/frontend"

          cp "dist/AgentMeter${{ matrix.binary_ext }}" "$package_root/"
          cp -R frontend/dist "$package_root/frontend/dist"
          cp README.md README.zh-CN.md LICENSE CHANGELOG.md "$package_root/"

          if [[ ! -f "$package_root/frontend/dist/index.html" ]]; then
            echo "Release package is missing frontend/dist/index.html" >&2
            exit 1
          fi

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "$package_root" && zip -r "../../${{ matrix.asset_name }}" .)
          else
            (cd "$package_root" && tar -czf "../../${{ matrix.asset_name }}" .)
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentMeter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: AgentMeter-*
          path: dist
          merge-multiple: true

      - name: Prepare release notes and checksums
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          notes="$(
            awk -v tag="$tag" '
              index($0, "## [" tag "]") == 1 || $0 == "## " tag || index($0, "## " tag " ") == 1 {
                found = 1
                next
              }
              found && $0 ~ "^##[[:space:]]+" {
                exit
              }
              found {
                print
              }
            ' CHANGELOG.md
          )"

          if [[ -z "${notes//[[:space:]]/}" ]]; then
            notes="Automated multi-platform build."
          fi

          printf "%s\n" "$notes" > dist/release-notes.md
          (cd dist && sha256sum AgentMeter-* > checksums.txt)

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          notes="dist/release-notes.md"
          mapfile -t assets < <(
            find dist -maxdepth 1 -type f \( -name "AgentMeter-*.zip" -o -name "AgentMeter-*.tar.gz" -o -name "checksums.txt" \) | sort
          )

          if ((${#assets[@]} == 0)); then
            echo "No release assets found" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --title "AgentMeter $tag" --notes-file "$notes"
          else
            gh release create "$tag" "${assets[@]}" --title "AgentMeter $tag" --notes-file "$notes"
          fi
