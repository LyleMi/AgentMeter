name: Feature request
description: Suggest an AgentMeter improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep examples synthetic and do not include private session data.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Supported agent or parser
        - Web UI
        - TUI
        - Pricing
        - Audit
        - Agent Privacy
        - Packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the behavior, workflow, or data shape you want.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples or alternatives
      description: Include synthetic examples, comparable workflows, or alternatives you considered.
    validations:
      required: false
  - type: dropdown
    id: interface
    attributes:
      label: Interfaces affected
      options:
        - Web only
        - TUI only
        - Web and TUI
        - Backend/API only
        - Documentation only
        - Not sure
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation ideas
      description: Suggest focused checks or smoke paths that would prove the feature works.
    validations:
      required: false
